name: 每日收盘行情日报
on:
  schedule:
    - cron: "45 15 * * 1-5"
    timezone: 'Asia/Shanghai'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install akshare pandas -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: 运行脚本
        env:
          MAIL_SENDER: ${{ secrets.MAIL_SENDER }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
          MAIL_AUTH: ${{ secrets.MAIL_AUTH }}
        run: python stockA_report.py
